name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  documentation:
    name: Documentation + Privacy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate required project documents
        run: |
          test -f README.md
          test -f AGENTS.md
          test -f CHANGELOG.md
          test -f docs/domain/FOUNDATIONS.md
          test -f docs/domain/DATA_CONTRACTS.md
          test -f docs/domain/ECONOMIC_INTELLIGENCE.md
          test -f docs/domain/data-dictionary/afinia-billing.md
          test -f docs/architecture/00-architecture.md
          test -f docs/frontend/FRONTEND_ARCHITECTURE.md
          test -f docs/phases/UNIFIED_DEVELOPMENT_LINE.md
          test -f docs/phases/LOOP_REGISTRY.md
          test -f docs/phases/NEXT_STEPS.md
          test -f docs/qa_reports/TEST_PLAN.md
          test -f docs/qa_reports/FRONTEND_FOUNDATION_TEST_PLAN.md
          test -f docs/qa_reports/ECONOMIC_INTELLIGENCE_TEST_PLAN.md
          test -f apps/web/package.json
          test -f apps/web/package-lock.json

      - name: Reject private exports and local secrets
        run: |
          if find . -type f \( -name '*.csv' -o -name '*.xlsx' -o -name '.env' \) \
            -not -path './tests/fixtures/*' \
            -not -path './.venv/*' \
            -not -path './.git/*' \
            -not -path './apps/web/node_modules/*' \
            | grep .; then
            echo 'Private export or local secret file committed outside approved fixtures.'
            exit 1
          fi

  python-quality:
    name: Python Quality + Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: '0.11.26'
          enable-cache: true
          cache-dependency-glob: '*.lock'

      - name: Sync dependencies
        run: uv sync --extra dev --frozen

      - name: Lint
        run: uv run ruff check . --output-format=json > ruff-report.json

      - name: Upload Ruff diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ruff-report
          path: ruff-report.json
          if-no-files-found: ignore
          retention-days: 7

      - name: Format
        run: uv run ruff format --check --diff . > ruff-format.diff

      - name: Upload Ruff format diff
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ruff-format-diff
          path: ruff-format.diff
          if-no-files-found: ignore
          retention-days: 7

      - name: Type check
        run: uv run mypy solgreen --no-color-output > mypy-report.txt

      - name: Upload mypy diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mypy-report
          path: mypy-report.txt
          if-no-files-found: ignore
          retention-days: 7

      - name: Tests with coverage
        run: uv run pytest --cov=solgreen --cov-fail-under=80

  frontend:
    name: Frontend Typecheck + Tests + Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: npm ci --no-audit --no-fund

      - name: Validate Showcase Ink constraints
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const root = path.join(process.cwd(), 'src');
          const forbidden = [
            /Playfair/i,
            /--accent/i,
            /--danger/i,
            /--success/i,
            /linear-gradient/i,
            /radial-gradient/i,
            /backdrop-filter/i,
          ];
          const allowedHex = new Set([
            '#20242B', '#5B626D', '#D8DCE1', '#F4F5F7', '#FFFFFF',
            '#8B929A', '#3A3F47', '#15181C', '#0B0D10',
          ].map((value) => value.toLowerCase()));

          function walk(directory) {
            return fs.readdirSync(directory, { withFileTypes: true }).flatMap((entry) => {
              const target = path.join(directory, entry.name);
              return entry.isDirectory() ? walk(target) : [target];
            });
          }

          const files = walk(root).filter((file) => /\.(css|tsx|ts)$/.test(file));
          const errors = [];

          for (const file of files) {
            const content = fs.readFileSync(file, 'utf8');
            for (const rule of forbidden) {
              if (rule.test(content)) errors.push(`${file}: forbidden ${rule}`);
            }
            if (file.endsWith('.css')) {
              for (const match of content.matchAll(/#[0-9a-fA-F]{6}/g)) {
                if (!allowedHex.has(match[0].toLowerCase())) {
                  errors.push(`${file}: non-canonical color ${match[0]}`);
                }
              }
            }
          }

          if (errors.length > 0) {
            console.error(errors.join('\n'));
            process.exit(1);
          }

          console.log('Showcase Ink constraints validated.');
          NODE

      - name: Type check
        run: npm run typecheck > frontend-typecheck.txt 2>&1

      - name: Upload TypeScript diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-typecheck
          path: apps/web/frontend-typecheck.txt
          if-no-files-found: ignore
          retention-days: 7

      - name: Component tests
        run: npm run test

      - name: Production build
        run: npm run build
