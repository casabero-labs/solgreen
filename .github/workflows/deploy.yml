name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'docs/**'
      - 'graphify-out/**'

env:
  COOLIFY_URL: https://panel.casabero.com
  COOLIFY_UUID: qj8qs84d37cn1m17zsclr0s9

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.26"
          enable-cache: true
          cache-dependency-glob: "*.lock"

      - name: Sync dependencies
        run: uv sync --extra dev --frozen

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Type check (mypy strict)
        run: uv run mypy solgreen

      - name: Tests with coverage
        run: uv run pytest --cov=solgreen --cov-fail-under=80

      - name: Install Infisical CLI
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          curl -1sLf 'https://dl.cloudsmith.io/public/infisical/infisical-cli/setup.deb.sh' | sudo -E bash
          sudo apt-get install -y infisical

      - name: Trigger Coolify Deploy
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          COOLIFY_API_KEY: ${{ secrets.COOLIFY_API_KEY }}
        run: |
          set -e

          echo "Triggering Coolify deployment..."
          RESPONSE=$(curl -s -X POST "${{ env.COOLIFY_URL }}/api/v1/deploy?uuid=${{ env.COOLIFY_UUID }}&force=true" \
            -H "Authorization: Bearer $COOLIFY_API_KEY" \
            -H "Content-Type: application/json")

          echo "Response: $RESPONSE"

          DEPLOYMENT_UUID=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print((d.get('deployments') or [{}])[0].get('deployment_uuid',''))" 2>/dev/null || echo "")

          if [ -z "$DEPLOYMENT_UUID" ]; then
            echo "No deployment UUID returned; deployment may already be in progress."
            exit 0
          fi

          echo "Deployment UUID: $DEPLOYMENT_UUID"

          INTERVAL=15
          MAX_RETRIES=80

          for i in $(seq 1 $MAX_RETRIES); do
            sleep $INTERVAL

            STATUS_RESPONSE=$(curl -s "${{ env.COOLIFY_URL }}/api/v1/deployments/$DEPLOYMENT_UUID" \
              -H "Authorization: Bearer $COOLIFY_API_KEY")

            STATUS=$(echo "$STATUS_RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status', d.get('data', {}).get('status', 'unknown')))" 2>/dev/null || echo "error")

            echo "[$i/$MAX_RETRIES] status=$STATUS"

            case "$STATUS" in
              finished)
                echo "Deployment finished successfully."
                exit 0
                ;;
              failed|canceled)
                echo "Deployment $STATUS"
                echo "Details: $STATUS_RESPONSE"
                exit 1
                ;;
            esac
          done

          echo "Timeout waiting for deployment"
          exit 1
